plugins {
	id "java"
	id "idea"
	id "eclipse"
	id "net.minecraftforge.gradle" version "${forgegradle_version}"
	id 'net.minecraftforge.renamer' version '1.0.14'
}

version = mod_version
group = "me.shaweel.transformableitems"

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

renamer.enableMixinRefmaps {
	config "transformableitems.mixins.json"
}
renamer.classes(tasks.named('jar', Jar)) {
	archiveClassifier = 'srg'
	mappings renamer.mixin.generatedMappings
}

sourceSets.main.resources { srcDir "src/generated/resources" }

minecraft {
	runs {
		configureEach {
			workingDir = layout.projectDirectory.dir("run")

			systemProperty "eventbus.api.strictRuntimeChecks", "true"
			systemProperty "forge.enabledGameTestNamespaces", "transformableitems"
			args "--mixin.config=transformableitems.mixins.json"
		}

		register("client")

		register("server") {
			args "--nogui"
		}

		register("gameTestServer")

		register("data") {
			workingDir = layout.projectDirectory.dir("run-data")

			args "--mod", "transformableitems", "--all", "--output", layout.projectDirectory.dir("src/generated/resources"), "--existing", layout.projectDirectory.dir("src/main/resources")
		}
	}
}

repositories {
	minecraft.mavenizer(it)
	maven fg.forgeMaven
	maven fg.minecraftLibsMaven
	mavenCentral()
}

renamer.mappings(minecraft.dependency.toSrg)

dependencies {
	implementation minecraft.dependency("net.minecraftforge:forge:${minecraft_version}-${forge_version}")
	annotationProcessor "net.minecraftforge:eventbus-validator:7.0.1"
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = "UTF-8"
}


tasks.named('jar', Jar) {
	manifest {
		attributes['MixinConfigs'] = "transformableitems.mixins.json"
	}
}